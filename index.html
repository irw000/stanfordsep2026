  sources:[

    ["Stanford GSB YouTube: Deborah Gruenfeld on Power & Influence","https://www.youtube.com/watch?v=KdQHAeAnHmw"]

},

const grid = document.getElementById('grid');
const search = document.getElementById('search');
const count = document.getElementById('count');

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// Try cover sources in order; show the styled placeholder only if all fail.
function coverSources(isbn){
  return [
    `https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg?default=false`,
    `https://books.google.com/books/content?vid=ISBN:${isbn}&printsec=frontcover&img=1&zoom=1`
  ];
}
function handleCoverError(img){
  let i = parseInt(img.dataset.srcIdx||'0',10) + 1;
  const sources = JSON.parse(img.dataset.sources);
  if(i < sources.length){
    img.dataset.srcIdx = i;
    img.src = sources[i];
  } else {
    img.style.display='none';
    img.nextElementSibling.style.display='flex';
  }
}

books.forEach(b=>{
  const card = document.createElement('article');
  card.className='card';
  card.dataset.text = (b.title+' '+b.subtitle+' '+b.author+' '+b.year+' '+b.concept+' '+b.summary+' '+b.frameworks).toLowerCase();
  const sources = coverSources(b.isbn);
  card.innerHTML = `
    <div class="card-head">
      <div class="cover-wrap">
        <img class="cover" src="${sources[0]}" alt="Cover of ${esc(b.title)}" loading="lazy"
             data-src-idx="0" data-sources='${esc(JSON.stringify(sources))}'
             onerror="handleCoverError(this)">
        <div class="cover-fallback"><span>${esc(b.title)}</span><small>${b.year}</small></div>
      </div>
      <div class="head-text">
        <span class="num">No. ${String(b.num).padStart(2,'0')}</span>
        <h2>${esc(b.title)}</h2>
        <p class="subtitle">${esc(b.subtitle)}</p>
        <p class="byline"><span>${esc(b.author)}</span><span class="year">${b.year}</span></p>
        <p class="concept">${esc(b.concept)}</p>
        <span class="expand-row">
          <svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8C1515" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>
          <span class="expand-label">Read summary &amp; frameworks</span>
        </span>
      </div>
    </div>
    <div class="card-body">
      <div class="card-body-inner">
        <div class="section-label">Executive Summary</div>
        <p>${esc(b.summary)}</p>
        <div class="section-label">Frameworks, Tools &amp; Methodologies</div>
        ${b.frameworks}
        <div class="section-label">Sources &amp; Media</div>
        <div class="sources">
          ${b.sources.map(s=>`<a href="${s[1]}" target="_blank" rel="noopener">${esc(s[0])}</a>`).join('')}
        </div>
      </div>
    </div>`;
  const head = card.querySelector('.card-head');
  head.addEventListener('click', e=>{
    if(e.target.tagName==='A') return;
    card.classList.toggle('open');
    const lbl = card.querySelector('.expand-label');
    lbl.textContent = card.classList.contains('open') ? 'Hide details' : 'Read summary & frameworks';
  });
  grid.appendChild(card);
});

const cards = Array.from(document.querySelectorAll('.card'));
const noRes = document.createElement('div');
noRes.className='no-results';
noRes.textContent='No books match your search.';
noRes.style.display='none';
grid.appendChild(noRes);

function updateCount(n){
  count.textContent = n === books.length ? `${books.length} books` : `${n} of ${books.length} books`;
}
updateCount(books.length);

search.addEventListener('input', ()=>{
  const q = search.value.trim().toLowerCase();
  let visible=0;
  cards.forEach(c=>{
    const match = !q || c.dataset.text.includes(q);
    c.classList.toggle('hidden', !match);
    if(match) visible++;
  });
  noRes.style.display = visible===0 ? 'block' : 'none';
  updateCount(visible);
});

document.getElementById('expandAll').addEventListener('click',()=>{
  cards.forEach(c=>{ if(!c.classList.contains('hidden')){ c.classList.add('open'); const l=c.querySelector('.expand-label'); if(l) l.textContent='Hide details'; }});
});
document.getElementById('collapseAll').addEventListener('click',()=>{
  cards.forEach(c=>{ c.classList.remove('open'); const l=c.querySelector('.expand-label'); if(l) l.textContent='Read summary & frameworks'; });
});
</script>
</body>
</html>

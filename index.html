  discussion:{en:["Where is your organization 'running to stay in place' against tougher competitors?","Has a past strength quietly become a competency trap as the market shifted?","How do you build resilience by facing real competition rather than avoiding it?"],
    zh:["你的組織在哪裡正「拚命奔跑只為留在原地」，對抗更強的對手？","隨著市場轉變，某個過去的強項是否已悄悄變成能力陷阱？","你如何透過正面迎戰真實競爭、而非迴避，來建立韌性？"]},
  buyZH:null,
  sources:[{label:{en:"Princeton University Press Catalog Page",zh:"普林斯頓大學出版社書目頁面"},url:"https://press.princeton.edu/books/paperback/9780691173689/the-red-queen-among-organizations"},{label:{en:"Stanford GSB Faculty Book Archive",zh:"史丹佛 GSB 教師著作典藏"},url:"https://www.gsb.stanford.edu/faculty-research/books/red-queen-among-organizations-how-competitiveness-evolves"}]
}
];

// ---- state ----
let lang = 'en';
const saved = (function(){ try{ const u=new URLSearchParams(location.search).get('lang'); if(u==='zh'||u==='en')return u; return localStorage.getItem('sep_lang'); }catch(e){return null;} })();
if(saved==='zh'||saved==='en') lang = saved;
let activeTags = new Set();

const grid=document.getElementById('grid');
const search=document.getElementById('search');
const count=document.getElementById('count');
const filtersEl=document.getElementById('filters');
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

const TAG_ORDER=["Leadership","Strategy","Innovation","Org Design","Culture","Power & Influence","Ethics","Communication","Negotiation","Wellbeing"];
const allTags=TAG_ORDER.filter(t=>books.some(b=>b.tags.includes(t)));

// build chips once
allTags.forEach(t=>{
  const c=document.createElement('span');
  c.className='chip';c.dataset.tag=t;
  c.addEventListener('click',()=>{
    if(activeTags.has(t)){activeTags.delete(t);c.classList.remove('active');}
    else{activeTags.add(t);c.classList.add('active');}
    applyFilters();
  });
  filtersEl.appendChild(c);
});

function coverSources(isbn){
  return [`https://covers.openlibrary.org/b/isbn/${isbn}-L.jpg?default=false`,
          `https://books.google.com/books/content?vid=ISBN:${isbn}&printsec=frontcover&img=1&zoom=1`];
}
function handleCoverError(img){
  let i=parseInt(img.dataset.srcIdx||'0',10)+1;
  const s=JSON.parse(img.dataset.sources);
  if(i<s.length){img.dataset.srcIdx=i;img.src=s[i];}
  else{img.style.display='none';img.nextElementSibling.style.display='flex';}
}
window.handleCoverError=handleCoverError;

function renderFigure(b){
  if(!b.figure) return '';
  const svg=b.figure.svg[lang]||b.figure.svg.en;
  const cap=b.figure.caption[lang]||b.figure.caption.en;
  return `<figure class="figure">${svg}<figcaption>${esc(cap)}</figcaption></figure>`;
}
function renderContents(b){
  const c=b.contents; if(!c) return '';
  const u=UI[lang];
  const badge=c.verified?`<span class="verified-badge">${u.verified}</span>`:'';
  const heading=c.verified?u.toc:u.whatsInside;
  const note=c.verified?'':`<p class="outline-note">${u.outlineNote}</p>`;
  const items=c.items[lang].map(i=>`<li>${i}</li>`).join('');
  const listTag=c.verified?'ol':'ul';
  return `<details class="subtoggle"><summary>${heading} ${badge}<span class="tw">${u.show}</span></summary>
    <div class="sub-inner">${note}<${listTag}>${items}</${listTag}>
    <a class="preview-link" href="${PREVIEW(b.isbn)}" target="_blank" rel="noopener">${u.previewLink}</a></div></details>`;
}
function renderVideo(id){
  if(!id) return `<p class="watch-note">${UI[lang].noVideo}</p>`;
  return `<div class="video" data-vid="${id}"><img src="https://img.youtube.com/vi/${id}/hqdefault.jpg" alt="Play" loading="lazy"><div class="play"><svg viewBox="0 0 68 48" xmlns="http://www.w3.org/2000/svg"><path d="M66.5 7.7c-.8-2.9-3-5.1-5.9-5.9C55.3.5 34 .5 34 .5S12.7.5 7.4 1.8C4.5 2.6 2.3 4.8 1.5 7.7.2 13 .2 24 .2 24s0 11 1.3 16.3c.8 2.9 3 5.1 5.9 5.9C12.7 47.5 34 47.5 34 47.5s21.3 0 26.6-1.3c2.9-.8 5.1-3 5.9-5.9C67.8 35 67.8 24 67.8 24s0-11-1.3-16.3z" fill="#f00"/><path d="M27 34l18-10-18-10z" fill="#fff"/></svg></div></div>`;
}

function buildCards(){
  const u=UI[lang];
  // remove existing cards but keep grid element/listeners
  grid.innerHTML='';
  books.forEach(b=>{
    const card=document.createElement('article');
    card.className='card';
    card.dataset.tags=JSON.stringify(b.tags);
    card.dataset.text=(b.title[lang]+' '+b.title.en+' '+b.subtitle[lang]+' '+b.author+' '+b.year+' '+b.tags.map(t=>TAGS[t][lang]).join(' ')+' '+b.takeaway[lang]+' '+b.concept[lang]+' '+b.summary[lang]).toLowerCase();
    const src=coverSources(b.isbn);
    const buyZH=b.buyZH?`<a class="buy zh" href="${b.buyZH}" target="_blank" rel="noopener">${u.buyZh}</a>`:`<span class="buy none">${u.buyNone}</span>`;
    const enSmall=(lang==='zh'&&b.title.en!==b.title.zh)?`<p class="title-en-sm">${esc(b.title.en)}</p>`:'';
    card.innerHTML=`
      <div class="card-head">
        <div class="cover-wrap">
          <img class="cover" src="${src[0]}" alt="${esc(b.title[lang])}" loading="lazy" data-src-idx="0" data-sources='${esc(JSON.stringify(src))}' onerror="handleCoverError(this)">
          <div class="cover-fallback"><span>${esc(b.title[lang])}</span><small>${b.year}</small></div>
        </div>
        <div class="head-text">
          <span class="num">No. ${String(b.num).padStart(2,'0')}</span>
          <h2>${esc(b.title[lang])}</h2>${enSmall}
          <p class="subtitle">${esc(b.subtitle[lang])}</p>
          <p class="byline"><span>${esc(b.author)}</span><span class="year">${b.year}</span></p>
          <div class="tagrow">${b.tags.map(t=>`<span class="t">${esc(TAGS[t][lang])}</span>`).join('')}</div>
          <p class="takeaway"><b>${u.keyTakeaway}</b>${esc(b.takeaway[lang])}</p>
          <div class="buyrow"><a class="buy en" href="${BUY(b.isbn)}" target="_blank" rel="noopener">${u.buyEn}</a>${buyZH}</div>
          <span class="expand-row"><svg class="chev" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#8C1515" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg><span class="expand-label">${u.readMore}</span></span>
        </div>
      </div>
      <div class="card-body"><div class="card-body-inner">
        <div class="section-label">${u.about}</div>
        <p class="authorbio">${esc(b.authorBio[lang])}</p>
        <div class="section-label">${u.concept}</div>
        <p>${esc(b.concept[lang])}</p>
        <div class="section-label">${u.summary}</div>
        <p>${esc(b.summary[lang])}</p>
        <div class="section-label">${u.frameworks}</div>
        ${b.frameworks[lang]}${renderFigure(b)}
        <div class="section-label">${u.contents}</div>
        ${renderContents(b)}
        <div class="section-label">${u.discussion}</div>
        <ol class="discussion">${b.discussion[lang].map(q=>`<li>${esc(q)}</li>`).join('')}</ol>
        <div class="section-label">${u.watch}</div>
        ${renderVideo(b.video)}
        <div class="section-label">${u.learn}</div>
        <div class="sources">${b.sources.map(s=>`<a href="${s.url}" target="_blank" rel="noopener">${esc(s.label[lang])}</a>`).join('')}</div>
      </div></div>`;
    const er=card.querySelector('.expand-row');
    er.addEventListener('click',()=>{
      card.classList.toggle('open');
      er.querySelector('.expand-label').textContent=card.classList.contains('open')?UI[lang].showLess:UI[lang].readMore;
    });
    grid.appendChild(card);
  });
  noRes=document.createElement('div');
  noRes.className='no-results';noRes.textContent=UI[lang].noResults;noRes.style.display='none';
  grid.appendChild(noRes);
}

let noRes;
function setUIText(){
  const u=UI[lang];
  document.documentElement.lang = lang==='zh'?'zh-Hant':'en';
  document.body.classList.toggle('zh',lang==='zh');
  document.getElementById('hKicker').textContent=u.kicker;
  document.getElementById('hTitle').textContent=u.h1;
  document.getElementById('hIntro').textContent=u.intro;
  search.placeholder=u.searchPh;
  document.getElementById('expandAll').textContent=u.expandAll;
  document.getElementById('collapseAll').textContent=u.collapseAll;
  document.getElementById('clearFilters').textContent=u.clearFilters;
  document.getElementById('footer').textContent=u.footer;
  document.getElementById('langtoggle').textContent=u.langBtn;
  filtersEl.querySelectorAll('.chip').forEach(c=>{c.textContent=TAGS[c.dataset.tag][lang];});
}

function updateCount(n){count.textContent = n===books.length?UI[lang].booksWord(n):UI[lang].ofBooks(n,books.length);}

function applyFilters(){
  const q=search.value.trim().toLowerCase();
  const cards=grid.querySelectorAll('.card');
  let visible=0;
  cards.forEach(c=>{
    const tags=JSON.parse(c.dataset.tags);
    const tagOk=activeTags.size===0||tags.some(t=>activeTags.has(t));
    const textOk=!q||c.dataset.text.includes(q);
    const show=tagOk&&textOk;
    c.classList.toggle('hidden',!show);
    if(show) visible++;
  });
  if(noRes) noRes.style.display=visible===0?'block':'none';
  updateCount(visible);
}

function render(){ setUIText(); buildCards(); applyFilters(); }

search.addEventListener('input',applyFilters);
document.getElementById('expandAll').addEventListener('click',()=>{
  grid.querySelectorAll('.card').forEach(c=>{if(!c.classList.contains('hidden')){c.classList.add('open');const l=c.querySelector('.expand-label');if(l)l.textContent=UI[lang].showLess;}});
});
document.getElementById('collapseAll').addEventListener('click',()=>{
  grid.querySelectorAll('.card').forEach(c=>{c.classList.remove('open');const l=c.querySelector('.expand-label');if(l)l.textContent=UI[lang].readMore;});
});
document.getElementById('clearFilters').addEventListener('click',()=>{
  activeTags.clear();search.value='';
  filtersEl.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  applyFilters();
});
document.getElementById('langtoggle').addEventListener('click',()=>{
  lang = lang==='en'?'zh':'en';
  try{localStorage.setItem('sep_lang',lang);}catch(e){}
  render();
});

// video facade + figure lightbox (delegated on persistent grid)
const lightbox=document.getElementById('lightbox');
const lightboxInner=document.getElementById('lightboxInner');
function closeLightbox(){lightbox.classList.remove('show');lightboxInner.innerHTML='';}
grid.addEventListener('click',e=>{
  const v=e.target.closest('.video');
  if(v&&!v.querySelector('iframe')){
    const id=v.dataset.vid;
    v.innerHTML=`<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0" title="talk" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
    return;
  }
  const fig=e.target.closest('.figure');
  if(fig){const art=fig.querySelector('svg, img'); if(art){lightboxInner.innerHTML=art.outerHTML;lightbox.classList.add('show');}}
});
lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLightbox();});
document.getElementById('lightboxClose').addEventListener('click',closeLightbox);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});

render();
</script>
</body>
</html>
